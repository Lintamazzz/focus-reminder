name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: continuous-release
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      release_tag: ${{ steps.release.outputs.release_tag }}

    steps:
      - name: Create draft release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          release_tag="ci-$GITHUB_RUN_ID-$GITHUB_RUN_ATTEMPT"
          release_id="$(
            gh api --method POST "repos/$GITHUB_REPOSITORY/releases" \
              -f tag_name="$release_tag" \
              -f target_commitish="$GITHUB_SHA" \
              -f name="Focus Reminder Build $GITHUB_SHA" \
              -f body="Automated build from commit $GITHUB_SHA." \
              -F draft=true \
              -F prerelease=false \
              --jq '.id'
          )"
          echo "release_id=$release_id" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.name }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
          - name: Linux
            platform: ubuntu-22.04
            args: ""
          - name: Windows
            platform: windows-2025
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos-') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.prepare.outputs.release_id }}
          tagName: ${{ needs.prepare.outputs.release_tag }}
          releaseDraft: true
          prerelease: false
          releaseAssetNamePattern: "[name]_[version]_[platform]_[arch][ext]"
          args: ${{ matrix.args }}

  publish:
    name: Publish release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Replace latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        shell: bash
        run: |
          gh release delete latest --cleanup-tag --yes 2>/dev/null || true
          gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref=refs/tags/latest \
            -f sha="$GITHUB_SHA"

          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -f tag_name=latest \
            -f name="Focus Reminder Latest" \
            -f body="Automated build from commit $GITHUB_SHA." \
            -F draft=false \
            -F prerelease=false \
            -f make_latest=true

          gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$RELEASE_TAG" 2>/dev/null || true

  cleanup:
    name: Clean up failed release
    needs:
      - prepare
      - build
      - publish
    if: ${{ always() && needs.prepare.result == 'success' && needs.publish.result != 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Delete draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare.outputs.release_id }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        shell: bash
        run: |
          gh api --method DELETE "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" 2>/dev/null || true
          gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$RELEASE_TAG" 2>/dev/null || true
